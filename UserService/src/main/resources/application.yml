server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/userservice_hoteldb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: USER-SERVICE

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    #instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-withe-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka

