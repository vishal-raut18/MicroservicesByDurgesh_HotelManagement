server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hotelservice_hoteldb
    username: postgres
    password: Admin@123


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
    instance:
      #instance-id: ${spring.application.name}:${server.port}
      prefer-ip-address: true
    client:
      fetch-registry: true
      register-withe-eureka: true
      service-url:
        defaultZone: http://localhost:8761/eureka
